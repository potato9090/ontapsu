<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Lịch Sử 12 - Thứ Tự Bài Học</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --success: #22c55e;
            --error: #ef4444;
            --lesson-bg: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 850px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .lesson-header {
            background: var(--lesson-bg);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 800;
            margin: 30px 0 15px 0;
            color: #0f172a;
            border-left: 5px solid var(--primary);
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .quiz-card {
            background: var(--card);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .q-text { font-weight: 700; margin-bottom: 15px; display: block; }

        .options-group { display: grid; gap: 8px; }

        .option {
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .option:hover { background: #f1f5f9; border-color: var(--primary); }
        .option.selected { background: #dbeafe; border-color: var(--primary); }
        .option.correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #15803d; font-weight: 600; }
        .option.wrong { background: #fee2e2 !important; border-color: var(--error) !important; color: #b91c1c; }

        .controls {
            position: sticky;
            bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px 0;
            background: rgba(248, 250, 252, 0.8);
            backdrop-filter: blur(8px);
        }

        button {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-submit { background: var(--primary); color: white; }
        .btn-reset { background: #64748b; color: white; }

        #result-summary {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border: 2px solid var(--primary);
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HỆ THỐNG ÔN TẬP LỊCH SỬ 12</h1>
        <p>Học kỳ II - Theo trình tự bài học</p>
    </header>

    <div id="result-summary"></div>
    <div id="main-quiz"></div>

    <div class="controls">
        <button class="btn-reset" onclick="location.reload()">Làm lại từ đầu (Đảo đáp án)</button>
        <button class="btn-submit" id="submit-btn" onclick="checkAll()">Nộp bài & Chấm điểm</button>
    </div>
</div>

            { q: "Nguyên nhân quyết định thành công của hội nghị thành lập Đảng Cộng sản Việt Nam (đầu năm 1930) là", a: ["do tài năng, uy tín của Nguyễn Ái Quốc.", "sự chỉ đạo kịp thời của Đảng cộng sản Pháp.", "sự giúp đỡ của Lê-nin và Quốc tế cộng sản.", "nguyện vọng của các tổ chức cộng sản."], c: "do tài năng, uy tín của Nguyễn Ái Quốc." },
            { q: "Hành trình tìm đường cứu nước của Nguyễn Ái Quốc và Phan Bội Châu có điểm tương đồng về", a: ["hướng đi tìm đường cứu nước.", "lựa chọn khuynh hướng cứu nước.", "chủ trương dựa vào Nhật Bản.", "mục đích cuối cùng."], c: "mục đích cuối cùng." },
            { q: "Từ năm 1946 đến năm 1969, Hồ Chí Minh đảm nhận cương vị nào sau đây?", a: ["Chủ tịch nước Cộng hòa xã hội chủ nghĩa Việt Nam.", "Tổng Bí thư nước Việt Nam Dân chủ Cộng hòa.", "Tổng Bí thư nước Cộng hòa xã hội chủ nghĩa Việt Nam.", "Chủ tịch nước Việt Nam Dân chủ Cộng hòa."], c: "Chủ tịch nước Việt Nam Dân chủ Cộng hòa." },

          ]
        }
    ];

    let flatQuestions = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function init() {
        const container = document.getElementById('main-quiz');
        let totalCounter = 0;

        quizData.forEach((lesson) => {
            const lessonDiv = document.createElement('div');
            lessonDiv.className = 'lesson-section';
            lessonDiv.innerHTML = `<div class="lesson-header">${lesson.lesson}</div>`;

            lesson.questions.forEach((item) => {
                const qIdx = totalCounter++;
                const card = document.createElement('div');
                card.className = 'quiz-card';

                // Trộn đáp án
                let options = [...item.a];
                shuffle(options);
                
                flatQuestions.push({
                    ...item,
                    shuffledA: options,
                    userA: null
                });

                card.innerHTML = `
                    <span class="q-text">Câu ${qIdx + 1}: ${item.q}</span>
                    <div class="options-group" id="qgroup-${qIdx}">
                        ${options.map((opt, optIdx) => `
                            <div class="option" onclick="select(${qIdx}, ${optIdx}, this)">
                                ${String.fromCharCode(65 + optIdx)}. ${opt}
                            </div>
                        `).join('')}
                    </div>
                `;
                lessonDiv.appendChild(card);
            });
            container.appendChild(lessonDiv);
        });
    }

    function select(qIdx, optIdx, el) {
        const parent = document.getElementById(`qgroup-${qIdx}`);
        Array.from(parent.children).forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        flatQuestions[qIdx].userA = flatQuestions[qIdx].shuffledA[optIdx];
    }

    function checkAll() {
        let correct = 0;
        flatQuestions.forEach((item, idx) => {
            const parent = document.getElementById(`qgroup-${idx}`);
            const divs = Array.from(parent.children);

            divs.forEach((div, dIdx) => {
                const text = item.shuffledA[dIdx];
                if (text === item.c) div.classList.add('correct');
                if (item.userA === text && text !== item.c) div.classList.add('wrong');
            });

            if (item.userA === item.c) correct++;
        });

        const summary = document.getElementById('result-summary');
        summary.style.display = 'block';
        summary.innerHTML = `🏁 Kết quả: <b>${correct}/${flatQuestions.length}</b> câu đúng.`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('submit-btn').disabled = true;
    }

    init();
</script>
